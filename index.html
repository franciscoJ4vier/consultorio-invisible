<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio Invisible AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* Fix total para el video de fondo */
        .a-canvas { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; position: absolute !important; }
        video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: absolute !important; top: 0 !important; left: 0 !important; }
        
        .ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; width: 90%; pointer-events: none; }
        .card { background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 15px; border: 1px solid #4ECDC4; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="card">
            <h2 style="margin:0; font-size: 18px; color: #4ECDC4;">CONSULTORIO INVISIBLE</h2>
            <p style="margin:5px 0 0 0; font-size: 12px;">Enfoca el marcador impreso</p>
        </div>
    </div>

    <!-- Escena optimizada para estabilidad -->
    <a-scene 
        embedded 
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720; canvasWidth: 1280; canvasHeight: 720;">
        
        <!-- Marcador con SMOOTH (Suavizado) para evitar parpadeos -->
        <a-marker 
            preset="hiro" 
            smooth="true" 
            smoothCount="10" 
            smoothTolerance="0.01" 
            smoothThreshold="5">
            
            <a-entity id="contenido">
                <!-- Camilla -->
                <a-box position="0 0.1 0" width="1.5" height="0.1" depth="0.7" color="#CCC"></a-box>
                <a-box position="0 0.2 0" width="1.4" height="0.08" depth="0.65" color="#FFF"></a-box>
                
                <!-- Patas -->
                <a-cylinder position="-0.6 -0.15 -0.25" radius="0.03" height="0.5" color="#888"></a-cylinder>
                <a-cylinder position="0.6 -0.15 -0.25" radius="0.03" height="0.5" color="#888"></a-cylinder>
                <a-cylinder position="-0.6 -0.15 0.25" radius="0.03" height="0.5" color="#888"></a-cylinder>
                <a-cylinder position="0.6 -0.15 0.25" radius="0.03" height="0.5" color="#888"></a-cylinder>
                
                <!-- Texto -->
                <a-text id="frase" 
                        value="Cuando no somos comprendidos,\nno somos atendidos." 
                        position="0 1.2 0" align="center" color="#FFE66D" 
                        width="3.5" opacity="0"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const contenido = document.querySelector('#contenido');
        const frase = document.querySelector('#frase');
        let hecho = false;

        marker.addEventListener('markerFound', () => {
            if (hecho) return;
            hecho = true;
            setTimeout(() => {
                contenido.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 1000');
                setTimeout(() => {
                    frase.setAttribute('animation', 'property: opacity; to: 1; dur: 1000');
                }, 1000);
            }, 3000);
        });
    </script>
</body>
</html>
