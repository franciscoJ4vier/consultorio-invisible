<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio Interactivo</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Contenedor de botones */
        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000; width: 90%; justify-content: center;
        }

        .btn {
            background: #4ECDC4; border: none; color: white; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex: 1;
        }

        .btn-audio { background: #FF6B6B; } /* Botón rojo para alerta */

        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="controls">
        <button class="btn" onclick="accionAR('No me escuchan', 'Cuando no somos comprendidos, no somos atendidos.')">FRASE 1</button>
        <button class="btn btn-audio" onclick="accionAR('Tengo dolor', 'El dolor invisible también es real y necesita atención.')">FRASE 2</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <!-- El Cubo que reacciona -->
            <a-box id="cubo" position="0 0.5 0" color="#4ECDC4" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
            </a-box>

            <!-- Texto dinámico -->
            <a-text id="texto-ar" value="Toca un boton" 
                    position="0 1.5 0" align="center" color="#FFE66D" width="3.5">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const textoEntidad = document.querySelector('#texto-ar');
        const cuboEntidad = document.querySelector('#cubo');

        function accionAR(voz, textoLargo) {
            // 1. Cambiar el texto en el aire
            textoEntidad.setAttribute('value', textoLargo);

            // 2. Hacer que el cubo reaccione (cambio de color momentáneo)
            cuboEntidad.setAttribute('material', 'color', '#FF6B6B');
            setTimeout(() => cuboEntidad.setAttribute('material', 'color', '#4ECDC4'), 500);

            // 3. Hablar (Sonido)
            const mensajeVoz = new SpeechSynthesisUtterance(voz);
            mensajeVoz.lang = 'es-ES';
            window.speechSynthesis.speak(mensajeVoz);
        }
    </script>
</body>
</html>
