<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio Invisible | Final</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --frame-color: #ffffff;
            --bg-dark: #121212;
            --accent-yellow: #FFE66D;
            --teal-cube: #4ECDC4;
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        /* EL MARCO BLANCO TOTAL */
        .white-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            border-top: 140px solid var(--frame-color); /* Espacio para el título arriba */
            border-bottom: 120px solid var(--frame-color); /* Espacio para botones abajo */
            border-left: 40px solid var(--frame-color);
            border-right: 40px solid var(--frame-color);
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        /* TÍTULO EN NEGRO (IDÉNTICO A LA FOTO) */
        .header-container {
            position: fixed;
            top: 40px; left: 0; width: 100%;
            text-align: center;
            z-index: 20;
            color: #1a1a1a;
        }
        .header-container h1 {
            margin: 0; font-size: 24px; font-weight: 500; letter-spacing: 2px; line-height: 1;
        }
        .header-container h2 {
            margin: 0; font-size: 42px; font-weight: 800; letter-spacing: 4px;
        }

        /* BOTONES ABAJO (DIVIDIDOS 50/50) */
        .footer-buttons {
            position: fixed;
            bottom: 30px; left: 40px; right: 40px;
            display: flex;
            height: 60px;
            z-index: 25;
            background: #1a1a1a;
        }
        .btn {
            flex: 1;
            background: transparent;
            border: 0.5px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn:active { background: #333; }
        .btn-left { border-right: 1px solid rgba(255,255,255,0.2); }

        /* Ajuste de video y Canvas */
        #arjs-video { object-fit: cover !important; z-index: 1; }
        .a-canvas { z-index: 5 !important; } /* El cubo se ve en la ventana central */
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="header-container">
        <h1>CONSULTORIO</h1>
        <h2>INVISIBLE</h2>
    </div>

    <div class="white-frame"></div>

    <div class="footer-buttons">
        <button class="btn btn-left" onclick="speak('La empatía sana.')">EMPATÍA</button>
        <button class="btn" onclick="speak('Cuando no somos comprendidos, no somos atendidos.')">VISIBILIDAD</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <a-box id="cube" 
                   position="0 0.5 0" 
                   scale="1.3 1.3 1.3"
                   material="color: #4ECDC4; opacity: 0.9; metalness: 0.5; roughness: 0.2"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-box>

            <a-text id="ar-text" 
                    value="#FFE66D\nLa empatia sana" 
                    position="0 2 0" 
                    align="center" 
                    color="#FFE66D" 
                    width="4.5"
                    font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const textEl = document.querySelector('#ar-text');
        const cubeEl = document.querySelector('#cube');

        function speak(msg) {
            textEl.setAttribute('value', msg);
            
            // Animación de pulso
            cubeEl.setAttribute('animation__pulse', {
                property: 'scale',
                from: '1.3 1.3 1.3',
                to: '1.5 1.5 1.5',
                dur: 200,
                dir: 'alternate',
                loop: 2
            });

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(msg);
                u.lang = 'es-ES';
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
