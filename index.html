<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio Invisible - Protocolo 3.0</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.4); }
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }

        /* VISOR DE DIAGNÓSTICO */
        .ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid var(--line-color);
            box-sizing: border-box; pointer-events: none; z-index: 10;
            margin: 15px; width: calc(100% - 30px); height: calc(100% - 30px);
        }

        .status-header {
            position: fixed; top: 25px; left: 40px; color: white;
            font-size: 10px; letter-spacing: 3px; z-index: 20;
        }

        .data-logs {
            position: fixed; bottom: 40px; right: 40px; color: #888;
            font-size: 9px; text-align: right; z-index: 20;
        }

        #arjs-video { filter: grayscale(1) contrast(1.2); }
    </style>
</head>
<body>

    <div class="ui-overlay"></div>
    <div class="status-header">SYSTEM: SCANNING_DEBT // V.3.0</div>
    <div class="data-logs">LOG: MARKER_EXPECTED<br>STATUS: STANDBY</div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro" id="marker">
            
            <a-box id="cubo-clinico" 
                   position="0 0.5 0" 
                   material="color: #ffffff; wireframe: true; wireframeLinewidth: 1; opacity: 0.6"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-box>

            <a-text id="txt-principal" 
                    value="ANALISIS: BARRERA DETECTADA" 
                    position="0 1.5 0" align="center" color="#ffffff" width="3.5" opacity="0"></a-text>
            
            <a-text id="txt-secundario" 
                    value="Cuando no somos comprendidos,\nno somos atendidos." 
                    position="0 1.0 0" align="center" color="#888888" width="2.5" opacity="0"></a-text>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const cubo = document.querySelector('#cubo-clinico');
        const t1 = document.querySelector('#txt-principal');
        const t2 = document.querySelector('#txt-secundario');

        marker.addEventListener('markerFound', () => {
            document.querySelector('.data-logs').innerHTML = "LOG: TARGET_LOCKED<br>STATUS: ANALYZING";
            
            // Secuencia de desvanecimiento técnica (Brief Punto 6.1)
            setTimeout(() => {
                cubo.setAttribute('animation__fade', 'property: scale; to: 0.1 2 0.1; dur: 2500; easing: easeInOutExpo');
                
                setTimeout(() => {
                    t1.setAttribute('animation', 'property: opacity; to: 1; dur: 1000');
                    t2.setAttribute('animation', 'property: opacity; to: 1; dur: 1000; delay: 500');
                    hablar("Cuando no somos comprendidos, no somos atendidos"); // referencia citada removed
                }, 2000);
            }, 1000);
        });

        function hablar(msg) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(msg);
                u.lang = 'es-ES'; u.rate = 0.8; u.pitch = 0.5; // Voz sintética muy seria
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
