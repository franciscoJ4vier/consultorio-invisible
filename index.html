<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio AR</title>
    <!-- Librerías estables -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        /* Centrado total del video */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true;"
        vr-mode-ui="enabled: false">
        
        <!-- Usamos el marcador HIRO básico -->
        <a-marker preset="hiro" id="marker">
            <a-entity id="render-grupo">
                <!-- Camilla -->
                <a-box position="0 0.1 0" scale="1 0.1 0.6" color="#CCCCCC"></a-box>
                <a-box position="0 0.2 0" scale="0.9 0.1 0.55" color="#FFFFFF"></a-box>
                <!-- Patas -->
                <a-cylinder position="-0.4 0 -0.2" radius="0.02" height="0.4" color="#888"></a-cylinder>
                <a-cylinder position="0.4 0 -0.2" radius="0.02" height="0.4" color="#888"></a-cylinder>
                <a-cylinder position="-0.4 0 0.2" radius="0.02" height="0.4" color="#888"></a-cylinder>
                <a-cylinder position="0.4 0 0.2" radius="0.02" height="0.4" color="#888"></a-cylinder>
            </a-entity>

            <!-- Texto -->
            <a-text id="mensaje" 
                    value="Cuando no somos comprendidos,\nno somos atendidos." 
                    position="0 1 0" align="center" color="#FFE66D" 
                    width="3" opacity="0"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const grupo = document.querySelector('#render-grupo');
        const texto = document.querySelector('#mensaje');
        let activo = false;

        marker.addEventListener('markerFound', () => {
            console.log("¡Marcador encontrado!");
            if(!activo) {
                activo = true;
                setTimeout(() => {
                    // Desvanecer camilla
                    grupo.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 800');
                    // Mostrar texto
                    setTimeout(() => {
                        texto.setAttribute('animation', 'property: opacity; to: 1; dur: 1000');
                    }, 800);
                }, 3000);
            }
        });
    </script>
</body>
</html>
