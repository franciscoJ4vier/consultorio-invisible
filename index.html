<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultorio Invisible - Camilla</title>
    <script defer src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --frame-color: #ffffff;
            --accent-yellow: #FFE66D;
            --teal-cube: #4ECDC4;
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        /* MARCO BLANCO TIPO FOTO REFERENCIA */
        .white-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border-top: 140px solid var(--frame-color);
            border-bottom: 120px solid var(--frame-color);
            border-left: 40px solid var(--frame-color);
            border-right: 40px solid var(--frame-color);
            box-sizing: border-box; pointer-events: none; z-index: 10;
        }

        /* TÍTULO EN NEGRO */
        .header-container {
            position: fixed; top: 40px; left: 0; width: 100%;
            text-align: center; z-index: 20; color: #1a1a1a;
        }
        .header-container h1 { margin: 0; font-size: 24px; font-weight: 500; letter-spacing: 2px; }
        .header-container h2 { margin: 0; font-size: 42px; font-weight: 800; letter-spacing: 4px; }
        
        .hashtag-ui {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            z-index: 20; color: var(--accent-yellow); font-weight: bold; font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* INSTRUCCIONES */
        .instructions {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            border-radius: 20px; font-size: 13px; z-index: 15; text-align: center;
        }

        #arjs-video { object-fit: cover !important; z-index: 1; }
        .a-canvas { z-index: 5 !important; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>CONSULTORIO</h1>
        <h2>INVISIBLE</h2>
    </div>
    <div class="hashtag-ui">#SALUDame</div>

    <div class="white-frame"></div>
    <div class="instructions" id="instructions">📱 Apuntá al marcador HIRO</div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro" id="marker">
            
            <a-entity id="camilla-grupo" position="0 0.3 0">
                <a-box position="0 0 0" width="1.5" height="0.1" depth="0.7" color="#CCCCCC" class="fadeable"></a-box>
                <a-box position="0 0.08 0" width="1.4" height="0.08" depth="0.65" color="#EEEEEE" class="fadeable"></a-box>
                <a-cylinder position="-0.6 -0.3 -0.25" radius="0.03" height="0.6" color="#888888" class="fadeable"></a-cylinder>
                <a-cylinder position="0.6 -0.3 -0.25" radius="0.03" height="0.6" color="#888888" class="fadeable"></a-cylinder>
                <a-cylinder position="-0.6 -0.3 0.25" radius="0.03" height="0.6" color="#888888" class="fadeable"></a-cylinder>
                <a-cylinder position="0.6 -0.3 0.25" radius="0.03" height="0.6" color="#888888" class="fadeable"></a-cylinder>
            </a-entity>
            
            <a-text id="msg-1" value="Cuando no somos comprendidos,\nno somos atendidos." 
                    position="0 1.2 0" align="center" color="#FFFFFF" width="3.5" opacity="0"></a-text>
            
            <a-text id="msg-2" value="- Persona con discapacidad" 
                    position="0 0.7 0" align="center" color="#FFE66D" width="2.5" opacity="0"></a-text>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // aviso si JS está desactivado
    </script>
    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;">
            Este sitio necesita JavaScript para funcionar.
        </div>
    </noscript>
    <script>
        const marker = document.querySelector('#marker');
        const camilla = document.querySelector('#camilla-grupo');
        const msg1 = document.querySelector('#msg-1');
        const msg2 = document.querySelector('#msg-2');
        const instructions = document.querySelector('#instructions');
        
        let started = false;

        if (marker) {
            marker.addEventListener('markerFound', () => {
                instructions.style.display = 'none';
                if (!started) {
                    started = true;
                    
                    // 1. Esperar 3s y desvanecer camilla
                    setTimeout(() => {
                        // Animación de escala para la camilla
                        camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 2000; easing: easeInBack');
                        
                        // 2. Mostrar mensajes después de que la camilla se va
                        setTimeout(() => {
                            msg1.setAttribute('animation', 'property: opacity; to: 1; dur: 1500');
                            msg2.setAttribute('animation', 'property: opacity; to: 1; dur: 1500; delay: 1000');
                            hablar("Cuando no somos comprendidos, no somos atendidos");
                        }, 2000);
                    }, 3000);
                }
            });
        } else {
            console.warn('marker element not found');
        }

        function hablar(texto) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(texto);
                u.lang = 'es-ES';
                u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
