<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>#SALUDame - Consultorio Invisible</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --primary-white: #FFFFFF;
            --text-gray: #CCCCCC;
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica', sans-serif; }

        /* UI ADAPTATIVA: Asegura que el texto no se corte en ningún móvil */
        .ui-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 5vh 5vw; pointer-events: none; z-index: 20;
        }

        .campaign-header {
            color: var(--primary-white); text-align: center;
            text-transform: uppercase; letter-spacing: 0.5em;
            font-size: clamp(12px, 4vw, 18px); font-weight: 300;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        .instruction-tag {
            color: var(--text-gray); text-align: center;
            font-size: clamp(9px, 2.5vw, 12px); letter-spacing: 0.2em;
            text-transform: uppercase; background: rgba(0,0,0,0.4); padding: 5px;
        }

        #arjs-video { filter: grayscale(0.8) contrast(1.2); }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="campaign-header">#SALUDame</div>
        <div class="instruction-tag" id="status">Buscando marcador institucional...</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro" id="marker">
            
            <a-entity id="wrapper" scale="1 1 1">
                
                <a-entity id="camilla">
                    <a-box position="0 0.2 0" width="1.4" height="0.1" depth="0.7" color="#FFF" opacity="0.3" wireframe="true"></a-box>
                    <a-box position="0 0.1 0" width="1.3" height="0.3" depth="0.6" color="#AAA" opacity="0.1"></a-box>
                </a-entity>

                <a-text id="txt-1" 
                        value="Cuando no somos comprendidos,\nno somos atendidos." 
                        position="0 1.2 0" align="center" color="#FFF" width="3" opacity="0"
                        font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
                
                <a-text id="txt-2" 
                        value="YO EXISTO. MI SALUD IMPORTA." 
                        position="0 0.8 0" align="center" color="#FFF" width="2" opacity="0"
                        font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const wrapper = document.querySelector('#wrapper');
        const camilla = document.querySelector('#camilla');
        const status = document.querySelector('#status');
        const t1 = document.querySelector('#txt-1');
        const t2 = document.querySelector('#txt-2');

        // AJUSTE AUTOMÁTICO DE ENCUADRE
        function rescale() {
            const ratio = window.innerWidth / window.innerHeight;
            // Si la pantalla es muy estrecha (móvil portrait), reducimos el objeto para que quepa
            const factor = ratio < 1 ? ratio * 1.2 : 1;
            wrapper.setAttribute('scale', `${factor} ${factor} ${factor}`);
        }

        window.addEventListener('resize', rescale);
        window.addEventListener('load', rescale);

        marker.addEventListener('markerFound', () => {
            status.innerHTML = "Marcador verificado • Ejecutando análisis";
            
            setTimeout(() => {
                // Desvanecimiento de la camilla física (Punto 6.1)
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 2000; easing: easeInExpo');
                
                setTimeout(() => {
                    t1.setAttribute('animation', 'property: opacity; to: 1; dur: 800');
                    t2.setAttribute('animation', 'property: opacity; to: 1; dur: 800; delay: 400');
                    status.innerHTML = "Interpelación activa • Derechos Salud";
                    speak("Cuando no somos comprendidos, no somos atendidos. Yo existo. Mi salud importa.");
                }, 1500);
            }, 1000);
        });

        function speak(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texto);
                u.lang = 'es-ES'; u.rate = 0.85; u.pitch = 0.9;
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
