<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio Invisible | Premium AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --primary: #4ECDC4;
            --accent: #FFE66D;
            --bg-glass: rgba(15, 15, 15, 0.7);
        }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        /* Header Minimalista */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white; z-index: 10; text-align: left;
            letter-spacing: 2px;
        }
        .header h1 { margin: 0; font-size: 14px; font-weight: 300; opacity: 0.8; }
        .header div { width: 40px; height: 2px; background: var(--primary); margin-top: 5px; }

        /* Contenedor de Botones */
        .ui-container {
            position: fixed; bottom: 40px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; z-index: 100;
        }

        .btn-elegant {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 85%;
            padding: 18px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-elegant:active {
            transform: scale(0.95);
            background: rgba(78, 205, 196, 0.2);
            border-color: var(--primary);
        }

        .btn-elegant span { color: var(--primary); font-size: 18px; }

        /* Ajuste de video */
        #arjs-video { object-fit: cover !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CONSULTORIO INVISIBLE</h1>
        <div></div>
    </div>

    <div class="ui-container">
        <button class="btn-elegant" onclick="speak('La empatía es el primer paso para una atención digna.', 'EMPATÍA')">
            La Experiencia del Paciente <span>→</span>
        </button>
        
        <button class="btn-elegant" onclick="speak('Cuando no somos comprendidos, no somos atendidos.', 'VISIBILIDAD')">
            Barreras Invisibles <span>→</span>
        </button>

        <button class="btn-elegant" style="border-color: var(--accent);" onclick="speak('El sistema debe adaptarse a la persona, no al revés.', 'SISTEMA')">
            Propuesta de Cambio <span>●</span>
        </button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <!-- Objeto Central Elegante -->
            <a-box id="objeto-ar" position="0 0.5 0" scale="0.8 0.8 0.8"
                   material="color: #ffffff; opacity: 0.9; metalness: 0.5; roughness: 0.2"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-box>

            <!-- Texto AR -->
            <a-text id="texto-ar" value="..." 
                    position="0 1.5 0" align="center" color="#FFE66D" 
                    width="3.2" font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const textoEntidad = document.querySelector('#texto-ar');
        const objetoAr = document.querySelector('#objeto-ar');

        function speak(frase, etiqueta) {
            // Actualizar Texto en AR
            textoEntidad.setAttribute('value', frase);
            
            // Animación de pulso al objeto
            objetoAr.setAttribute('animation__pulse', {
                property: 'scale',
                from: '0.8 0.8 0.8',
                to: '1.1 1.1 1.1',
                dur: 300,
                dir: 'alternate',
                loop: 2
            });

            // Voz
            const utterance = new SpeechSynthesisUtterance(frase);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9; // Un poco más lento para que suene elegante
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
