<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>#SALUDame - Control de Accesibilidad</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* MARGEN FIJO DE SEGURIDAD (UI INSTITUCIONAL) */
        .safe-margin {
            position: fixed; top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; z-index: 100;
        }

        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .controls-hint {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: #AAA; font-size: 10px; letter-spacing: 2px; z-index: 110;
            text-transform: uppercase; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing: 5px;">CARGANDO PROTOCOLO</div>
    </div>

    <div class="safe-margin"></div>
    <div class="controls-hint">Pellizca para Zoom • Arrastra para Mover</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        gesture-detector
        vr-mode-ui="enabled: false">

        <a-marker 
            preset="hiro" 
            raycaster="objects: .clickable"
            emitevents="true" 
            cursor="fuse: false; rayOrigin: mouse;"
            id="marker">
            
            <a-entity 
                id="target-entity"
                class="clickable"
                gesture-handler="minScale: 0.5; maxScale: 5;"
                position="0 0 0">
                
                <a-entity id="camilla-obj">
                    <a-box position="0 0.1 0" width="1.2" height="0.1" depth="0.7" color="#FFF" opacity="0.2" wireframe="true"></a-box>
                </a-entity>

                <a-entity id="text-block" position="0 1 0" scale="0 0 0">
                    <a-text 
                        value="Cuando no somos comprendidos,\nno somos atendidos." 
                        align="center" color="#FFFFFF" width="4"
                        font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
                    
                    <a-text 
                        value="YO EXISTO. MI SALUD IMPORTA." 
                        position="0 -0.5 0" align="center" color="#888" width="2.5"
                        font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
                </a-entity>

            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Gestión de carga
        window.addEventListener('camera-init', () => {
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        });

        const marker = document.getElementById('marker');
        const camilla = document.getElementById('camilla-obj');
        const textBlock = document.getElementById('text-block');

        marker.addEventListener('markerFound', () => {
            // Secuencia de transformación
            setTimeout(() => {
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 1500; easing: easeInQuad');
                
                setTimeout(() => {
                    textBlock.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 1000; easing: easeOutElastic');
                    speak("Cuando no somos comprendidos, no somos atendidos. Yo existo. Mi salud importa.");
                }, 1600);
            }, 500);
        });

        function speak(t) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'es-ES'; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
