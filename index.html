<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio AR Estable</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
        .instrucciones {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 10; font-family: sans-serif; font-size: 14px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="instrucciones" id="guia">Apunta al marcador Hiro</div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker 
            preset="hiro" 
            id="marker"
            smooth="true" 
            smoothCount="15" 
            smoothTolerance="0.05" 
            smoothThreshold="10">
            
            <a-entity id="escena-completa" scale="1 1 1">
                <a-entity id="camilla-obj">
                    <a-box position="0 0.1 0" scale="1.5 0.1 0.7" color="#CCCCCC"></a-box>
                    <a-box position="0 0.2 0" scale="1.4 0.12 0.65" color="#FFFFFF"></a-box>
                    <a-cylinder position="-0.6 0 -0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="0.6 0 -0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="-0.6 0 0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="0.6 0 0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                </a-entity>

                <a-text id="mensaje" 
                        value="Cuando no somos comprendidos,\nno somos atendidos." 
                        position="0 1.2 0" align="center" color="#FFE66D" 
                        width="4" opacity="0"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const camilla = document.querySelector('#camilla-obj');
        const mensaje = document.querySelector('#mensaje');
        const guia = document.querySelector('#guia');
        let detectado = false;

        marker.addEventListener('markerFound', () => {
            if (detectado) return;
            detectado = true;
            
            console.log("Detección estable iniciada");
            guia.innerText = "¡Experiencia Iniciada!";
            
            // Animación a los 2 segundos de haberlo encontrado
            setTimeout(() => {
                // Desaparece camilla
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 1200; easing: easeInBack');
                
                // Aparece mensaje
                setTimeout(() => {
                    mensaje.setAttribute('animation', 'property: opacity; to: 1; dur: 1500');
                    guia.style.display = 'none';
                }, 1000);
            }, 2000);
        });
    </script>
</body>
</html>
