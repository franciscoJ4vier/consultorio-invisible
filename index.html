<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>#SALUDame - Interacción Táctil</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif; transition: opacity 0.5s;
        }
        .instruction-overlay {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 10px; z-index: 100;
            text-align: center; pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div style="letter-spacing: 4px; font-size: 12px;">MODO INTERACTIVO</div>
        <p style="font-size: 9px; color: #666;">Pellizca la pantalla para ajustar tamaño</p>
    </div>

    <div class="instruction-overlay">Usa dos dedos para alejar o acercar el elemento</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        gesture-detector
        vr-mode-ui="enabled: false">

        <a-marker 
            preset="hiro" 
            raycaster="objects: .clickable"
            emitevents="true" 
            cursor="fuse: false; rayOrigin: mouse;"
            id="marker">
            
            <a-entity 
                id="main-wrapper"
                gesture-handler="minScale: 0.25; maxScale: 4;"
                class="clickable"
                position="0 0 0">
                
                <a-entity id="camilla">
                    <a-box position="0 0.2 0" width="1.5" height="0.1" depth="0.8" color="#FFF" opacity="0.3" wireframe="true"></a-box>
                    <a-box position="0 0.1 0" width="1.4" height="0.3" depth="0.7" color="#FFF" opacity="0.1"></a-box>
                </a-entity>

                <a-entity id="textos" position="0 1.2 0" scale="0 0 0">
                    <a-text value="Cuando no somos comprendidos,\nno somos atendidos." 
                            align="center" color="#FFFFFF" width="3.5" position="0 0.2 0"></a-text>
                    <a-text value="YO EXISTO. MI SALUD IMPORTA." 
                            align="center" color="#888" width="2.5" position="0 -0.3 0"></a-text>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Quitar splash al iniciar cámara
        window.addEventListener('camera-init', () => {
            setTimeout(() => { document.getElementById('splash').style.opacity = '0'; }, 1000);
        });

        const marker = document.getElementById('marker');
        const camilla = document.getElementById('camilla');
        const textos = document.getElementById('textos');

        marker.addEventListener('markerFound', () => {
            setTimeout(() => {
                // Animación de desvanecimiento
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 2000; easing: easeInBack');
                
                setTimeout(() => {
                    // Revelar mensaje
                    textos.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 1000; easing: easeOutElastic');
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance("Cuando no somos comprendidos, no somos atendidos. Yo existo. Mi salud importa.");
                        u.lang = 'es-ES'; u.rate = 0.85;
                        window.speechSynthesis.speak(u);
                    }
                }, 1800);
            }, 1000);
        });
    </script>
</body>
</html>
