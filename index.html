<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>#SALUDame - Consultorio Invisible</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* PANTALLA DE BIENVENIDA / CARGA */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease; font-family: sans-serif;
        }
        .loader {
            width: 40px; height: 40px; border: 2px solid #333;
            border-top: 2px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .welcome-text { letter-spacing: 5px; font-size: 14px; text-transform: uppercase; font-weight: 300; }

        /* INTERFAZ DE USUARIO AR (Invisible hasta que cargue) */
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
            border: 15px solid transparent; box-sizing: border-box;
        }
        .status-bar { color: white; font-size: 10px; font-family: monospace; text-align: center; margin-top: 20px; }

        /* Ajustes de cámara para evitar que se rompa el aspecto */
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { filter: grayscale(1) brightness(0.6); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader"></div>
        <div class="welcome-text">Iniciando Protocolo #SALUDame</div>
        <p style="color: #666; font-size: 9px; margin-top: 15px;">CARGANDO COMPONENTES DE INCIDENCIA...</p>
    </div>

    <div id="ui-overlay">
        <div class="status-bar" id="log">BUSCANDO ENTORNO CLÍNICO...</div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        renderer="precision: medium; antialias: true;">

        <a-marker preset="hiro" id="marker">
            <a-entity id="main-content" scale="0.8 0.8 0.8">
                
                <a-entity id="camilla-mesh">
                    <a-box position="0 0.2 0" width="1.5" height="0.1" depth="0.8" color="#FFF" opacity="0.4" wireframe="true"></a-box>
                    <a-box position="0 0.1 0" width="1.4" height="0.3" depth="0.7" color="#FFF" opacity="0.1"></a-box>
                </a-entity>

                <a-entity id="textos" position="0 1.3 0" scale="0 0 0">
                    <a-text value="Cuando no somos comprendidos,\nno somos atendidos." 
                            align="center" color="#FFFFFF" width="3.5" position="0 0.2 0"></a-text>
                    <a-text value="YO EXISTO. MI SALUD IMPORTA." 
                            align="center" color="#888" width="2.5" position="0 -0.3 0"></a-text>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const splash = document.getElementById('splash');
        const ui = document.getElementById('ui-overlay');
        const marker = document.getElementById('marker');
        const log = document.getElementById('log');
        const camilla = document.getElementById('camilla-mesh');
        const textos = document.getElementById('textos');

        // 1. GESTIÓN DE CARGA: Quitar splash cuando la cámara esté lista
        window.addEventListener('camera-init', () => {
            setTimeout(() => {
                splash.style.opacity = '0';
                ui.style.display = 'block';
                setTimeout(() => splash.remove(), 1000);
            }, 2000); // Pausa de cortesía para lectura de bienvenida
        });

        // 2. LÓGICA DE LA EXPERIENCIA (Brief 6.1)
        marker.addEventListener('markerFound', () => {
            log.innerText = "✓ ELEMENTO IDENTIFICADO: CAMILLA";
            
            setTimeout(() => {
                // Desvanecimiento técnico
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 2000; easing: easeInExpo');
                
                setTimeout(() => {
                    // Revelar mensaje de incidencia
                    textos.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 1000; easing: easeOutElastic');
                    log.innerText = "INTERPELACIÓN: VOZ ACTIVA";
                    hablar("Cuando no somos comprendidos, no somos atendidos. Yo existo. Mi salud importa.");
                }, 1800);
            }, 1000);
        });

        function hablar(t) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'es-ES'; u.rate = 0.85; u.pitch = 0.8;
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
