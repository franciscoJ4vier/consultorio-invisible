<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- removed user-scalable=no for accessibility -->
    <title>Consultorio AR | Super Frame</title>
    <script defer src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --primary: #4ECDC4;
            --frame-color: #ffffff;
            /* AQUÍ AJUSTAS EL TAMAÑO DE LOS BORDES */
            --frame-thickness: 40px; 
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica', sans-serif; }

        /* EL MARCO GRANDE */
        .ui-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            box-sizing: border-box;
            border: var(--frame-thickness) solid var(--frame-color);
        }

        /* Título sobre el marco superior */
        .header-title {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            z-index: 10;
            font-size: 12px;
            letter-spacing: 3px;
            font-weight: 900;
            text-transform: uppercase;
        }

        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            z-index: 1;
        }

        /* El Canvas AR por encima de todo para que el cubo traspase */
        .a-canvas {
            z-index: 100 !important;
        }

        /* Botones integrados */
        .ui-container {
            position: fixed; 
            bottom: calc(var(--frame-thickness) + 20px); 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 10px; 
            z-index: 101; 
            width: 80%;
        }

        .btn-elegant {
            background: #1a1a1a;
            border: none;
            color: white; 
            flex: 1; 
            padding: 15px;
            border-radius: 5px; 
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-elegant:active {
            background: var(--primary);
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="header-title">CONSULTORIO INVISIBLE</div>
    <div class="ui-frame"></div>

    <div class="ui-container">
        <button class="btn-elegant" onclick="speak('La empatía sana.')">Empatía</button>
        <button class="btn-elegant" onclick="speak('Barreras invisibles.')">Visibilidad</button>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-marker preset="hiro">
            <!-- Cubo más grande para asegurar que traspase los bordes de 40px -->
            <a-box id="objeto-ar" 
                   position="0 0.5 0" 
                   scale="1.5 1.5 1.5"
                   material="color: #4ECDC4; metalness: 0.5; roughness: 0.2; opacity: 0.95"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
                   visible="false">
            </a-box>

            <a-text id="texto-ar" value="..." 
                    position="0 2.2 0" align="center" color="#FFE66D" 
                    width="4" visible="false">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const textoEntidad = document.querySelector('#texto-ar');
        const objetoAr = document.querySelector('#objeto-ar');

        // controlar visibilidad según presencia del marcador
        if (marker) {
            marker.addEventListener('markerFound', () => {
                objetoAr.setAttribute('visible', 'true');
                textoEntidad.setAttribute('visible', 'true');
            });
            marker.addEventListener('markerLost', () => {
                objetoAr.setAttribute('visible', 'false');
                textoEntidad.setAttribute('visible', 'false');
            });
        } else {
            console.warn('No se encontró <a-marker> en el DOM');
        }

        function speak(frase) {
            textoEntidad.setAttribute('value', frase);
            
            objetoAr.setAttribute('animation__pulse', {
                property: 'scale',
                from: '1.5 1.5 1.5',
                to: '1.7 1.7 1.7',
                dur: 200,
                dir: 'alternate',
                loop: 2
            });

            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(frase);
                utterance.lang = 'es-ES';
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn('Speech synthesis no soportado');
            }
        }
    </script>
    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;">
            Este sitio requiere JavaScript para funcionar correctamente.
        </div>
    </noscript>
</body>
</html>
