<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio AR Inmune</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
        .indicador {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px dashed rgba(255,255,255,0.5);
            pointer-events: none; border-radius: 10px; z-index: 5;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Guía visual para el usuario -->
    <div class="indicador" id="marco"></div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <!-- Reducimos el suavizado para que la detección inicial sea más rápida -->
        <a-marker preset="hiro" id="marker" smooth="false">
            
            <a-entity id="contenedor-maestro">
                <!-- Camilla -->
                <a-entity id="camilla-modelo">
                    <a-box position="0 0.1 0" scale="1.5 0.1 0.7" color="#CCC"></a-box>
                    <a-box position="0 0.2 0" scale="1.4 0.12 0.65" color="#FFF"></a-box>
                    <a-cylinder position="-0.6 0 -0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="0.6 0 -0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="-0.6 0 0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                    <a-cylinder position="0.6 0 0.25" radius="0.03" height="0.4" color="#888"></a-cylinder>
                </a-entity>

                <!-- Frase -->
                <a-text id="mensaje" 
                        value="Cuando no somos comprendidos,\nno somos atendidos." 
                        position="0 1.2 0" align="center" color="#FFE66D" 
                        width="4" opacity="0"></a-text>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#marker');
        const camilla = document.querySelector('#camilla-modelo');
        const mensaje = document.querySelector('#mensaje');
        const marco = document.querySelector('#marco');
        let detectado = false;

        marker.addEventListener('markerFound', () => {
            if (detectado) return;
            detectado = true;
            
            // Acción inmediata: Quitar la guía visual
            marco.style.display = 'none';

            // Iniciamos la secuencia de transformación
            setTimeout(() => {
                // Desaparece camilla
                camilla.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 1000; easing: easeInBack');
                
                // Aparece mensaje
                setTimeout(() => {
                    mensaje.setAttribute('animation', 'property: opacity; to: 1; dur: 1000');
                }, 1000);
            }, 1500); // Empezamos rápido para que no dé tiempo a fallar
        });
    </script>
</body>
</html>
