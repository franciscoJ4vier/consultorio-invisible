<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Consultorio AR | Super Frame</title>
    <!-- Quitamos el defer para asegurar carga inmediata de la cámara -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        :root {
            --primary: #4ECDC4;
            --frame-color: #ffffff;
            --frame-thickness: 40px; 
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica', sans-serif; }

        /* EL MARCO GRANDE */
        .ui-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            box-sizing: border-box;
            border: var(--frame-thickness) solid var(--frame-color);
        }

        .header-title {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            color: #333; z-index: 10; font-size: 12px; letter-spacing: 3px;
            font-weight: 900; text-transform: uppercase;
        }

        /* Forzar visibilidad de la cámara */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            z-index: -1 !important; /* El video siempre al fondo real */
        }

        .a-canvas { z-index: 100 !important; }

        .ui-container {
            position: fixed; 
            bottom: calc(var(--frame-thickness) + 20px); 
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 101; width: 80%;
        }

        .btn-elegant {
            background: #1a1a1a; border: none; color: white; 
            flex: 1; padding: 15px; border-radius: 5px; 
            font-size: 11px; font-weight: bold; text-transform: uppercase; 
            letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="header-title">CONSULTORIO INVISIBLE</div>
    <div class="ui-frame"></div>

    <div class="ui-container">
        <button class="btn-elegant" onclick="speak('La empatía sana.')">Empatía</button>
        <button class="btn-elegant" onclick="speak('Barreras invisibles.')">Visibilidad</button>
    </div>

    <!-- Ajustamos la configuración de AR.js para que sea más agresiva al encender -->
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-marker preset="hiro" id="marker">
            <a-box id="objeto-ar" 
                   position="0 0.5 0" 
                   scale="1.5 1.5 1.5"
                   material="color: #4ECDC4; metalness: 0.5; roughness: 0.2; opacity: 0.95"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
                   visible="false">
            </a-box>

            <a-text id="texto-ar" value="..." 
                    position="0 2.2 0" align="center" color="#FFE66D" 
                    width="4" visible="false">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Referencias
        const marker = document.querySelector('#marker');
        const textoEntidad = document.querySelector('#texto-ar');
        const objetoAr = document.querySelector('#objeto-ar');

        // Eventos de marcador
        marker.addEventListener('markerFound', () => {
            objetoAr.setAttribute('visible', 'true');
            textoEntidad.setAttribute('visible', 'true');
        });

        marker.addEventListener('markerLost', () => {
            objetoAr.setAttribute('visible', 'false');
            textoEntidad.setAttribute('visible', 'false');
        });

        function speak(frase) {
            textoEntidad.setAttribute('value', frase);
            
            objetoAr.setAttribute('animation__pulse', {
                property: 'scale',
                from: '1.5 1.5 1.5',
                to: '1.7 1.7 1.7',
                dur: 200,
                dir: 'alternate',
                loop: 2
            });

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Detener voz anterior
                const utterance = new SpeechSynthesisUtterance(frase);
                utterance.lang = 'es-ES';
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
