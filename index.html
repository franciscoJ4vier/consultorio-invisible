<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Test Cubo AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #arjs-video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <!-- El Cubo -->
            <a-box 
                id="box"
                position="0 0.5 0" 
                material="color: #4ECDC4; opacity: 0.8;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
            </a-box>

            <!-- La Frase (aparecerá al detectar) -->
            <a-text 
                id="texto"
                value="Cuando no somos comprendidos,\nno somos atendidos." 
                position="0 1.5 0" 
                align="center" 
                color="#FFE66D" 
                width="3" 
                visible="false">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('a-marker');
        const texto = document.querySelector('#texto');

        marker.addEventListener('markerFound', () => {
            // Hacemos visible el texto permanentemente al encontrar el marcador
            texto.setAttribute('visible', 'true');
            console.log("Marcador detectado - Cubo activo");
        });

        marker.addEventListener('markerLost', () => {
            // Ocultamos el texto al perder el marcador
            texto.setAttribute('visible', 'false');
            console.log("Marcador perdido - Cubo inactivo");
        });
    </script>
</body>
</html>
